<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>Tourist Quest 2D</title>
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #f8fafc; }
    canvas { touch-action: none; }
    .btn { padding: 8px 12px; border-radius: 12px; font-size: 14px; border: none; cursor: pointer; }
    .btn-primary { background:#059669; color:#fff; }
    .btn-ghost { background:#e5e7eb; color:#111827; }
    .banner { position: fixed; left: 50%; transform: translateX(-50%); bottom: 12px; z-index: 9999;
              background: rgba(17,24,39,.9); color:#fff; padding: 10px 12px; border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.25); width: min(520px, calc(100% - 24px)); }
    .banner .title { font-weight: 700; font-size: 14px; margin-right: 6px; }
    .banner .row { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap: wrap; }
    .sr { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
  </style>
</head>
<body>
  <div id="root" class="w-full max-w-[980px]" style="max-width:980px;margin:0 auto;padding:12px;"></div>

  <!-- Install banner -->
  <div id="a2hs" class="banner" role="dialog" aria-live="polite" aria-label="Install app" hidden>
    <div class="row">
      <div>
        <div class="title">Install Tourist Quest 2D?</div>
        <div style="opacity:.8;font-size:12px">Add it to your home screen for quick access and offline play.</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button id="btnInstall" class="btn btn-primary">Install</button>
        <button id="btnLater" class="btn btn-ghost">Not now</button>
      </div>
    </div>
  </div>

  <!-- React & Babel (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
  // Service worker registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    });
  }

  // Install banner logic
  (function() {
    const banner = document.getElementById('a2hs');
    const btnInstall = document.getElementById('btnInstall');
    const btnLater = document.getElementById('btnLater');
    let deferredPrompt = null;

    // iOS: show guidance (Safari doesn't fire beforeinstallprompt; install via Share > Add to Home Screen)
    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    function showIosHelp() {
      banner.querySelector('.title').textContent = 'Add to Home Screen';
      banner.querySelector('div[style*="opacity"]').textContent = 'On iPhone/iPad: open in Safari, tap Share, then “Add to Home Screen”.';
      btnInstall.style.display = 'none';
      btnLater.textContent = 'Got it';
      banner.hidden = false;
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      banner.hidden = false;
    });

    btnInstall.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.hidden = true;
    });
    btnLater.addEventListener('click', () => banner.hidden = true);

    // If iOS and not installed, show guidance briefly
    document.addEventListener('DOMContentLoaded', () => {
      if (isIos && !isStandalone) {
        setTimeout(showIosHelp, 600);
      }
    });
  })();
  </script>

  <script type="text/babel">
    const { useRef, useState, useEffect } = React;

    function TouristQuest2D() {
      const canvasRef = useRef(null);
      const reqRef = useRef(0);

      // UI state
      const [paused, setPaused] = useState(false);
      const [showHelp, setShowHelp] = useState(true);
      const [activeAttraction, setActiveAttraction] = useState(null);
      const [visited, setVisited] = useState(() => new Set());

      // Optional tiny SFX
      const audioCtxRef = useRef(null);

      // World & player
      const keys = useRef({ left: false, right: false, jump: false });
      const world = useRef({ width: 6000, height: 640, gravity: 1800, groundY: 520 });
      const camera = useRef({ x: 0 });
      const player = useRef({ x: 120, y: 0, vx: 0, vy: 0, w: 36, h: 48, speed: 300, jumpImpulse: 650, onGround: false, facing: 1 });

      const attractions = useRef([
        { id: "table-mountain", name: "Table Mountain (Cape Town)", province: "Western Cape", x: 420, y: world.current.groundY - 60, color: "#2e7d32", fact: "A flat-topped mountain overlooking Cape Town; one of the New7Wonders of Nature.", url: "https://www.tablemountain.net/", bestTime: "Sep–Apr for clearer skies; go early morning for calmer winds.", pricing: "Free to hike; cableway ticket extra (seasonal pricing—check official site).", hours: "Cableway hours vary by season; trails open in daylight.", duration: "1–5 hours depending on hike or cableway.", notes: "Rapid weather changes; carry water, layers, sun protection." },
        { id: "robben-island", name: "Robben Island Museum", province: "Western Cape", x: 1000, y: world.current.groundY - 60, color: "#424242", fact: "UNESCO World Heritage Site where Nelson Mandela was imprisoned for 18 of his 27 years.", url: "https://www.robben-island.org.za/", bestTime: "Oct–Mar; seas calmer and daylight longer.", pricing: "Paid ferry/tour; book in advance (pricing varies).", hours: "Fixed ferry departure times; check schedule.", duration: "3–4 hours including ferry travel.", notes: "Bring ID; tours can sell out quickly." },
        { id: "kruger", name: "Kruger National Park", province: "Limpopo & Mpumalanga", x: 1680, y: world.current.groundY - 60, color: "#8d6e63", fact: "One of Africa's largest game reserves, home to the Big Five and diverse ecosystems.", url: "https://www.sanparks.org/parks/kruger", bestTime: "Dry season May–Oct for game viewing; Nov–Apr green season and birding.", pricing: "Daily conservation fees; SANParks rates apply.", hours: "Gate times vary by camp and season.", duration: "2–5 days recommended; day trips possible.", notes: "Self‑drive or guided drives; book camps early in peak season." },
        { id: "cradle", name: "Cradle of Humankind", province: "Gauteng & North West", x: 2280, y: world.current.groundY - 60, color: "#6d4c41", fact: "UNESCO site near Johannesburg with limestone caves and hominin fossils.", url: "https://www.maropeng.co.za/", bestTime: "Year‑round; mostly indoor exhibits and cave tours.", pricing: "Paid entry for Maropeng/Sterkfontein; combo tickets available.", hours: "Typically 09:00–17:00; confirm per site.", duration: "2–4 hours.", notes: "Cave tours include stairs; wear sturdy shoes." },
        { id: "drakensberg", name: "Drakensberg Amphitheatre", province: "KwaZulu‑Natal", x: 2920, y: world.current.groundY - 60, color: "#1e88e5", fact: "Basalt wall in uKhahlamba-Drakensberg Park, famed for hiking and rock art.", url: "https://www.kznwildlife.com/", bestTime: "Apr–May & Sep–Nov (clear, mild); summer storms common.", pricing: "Park entry permits may apply.", hours: "Daylight hiking; check trail access.", duration: "Half‑day to full day.", notes: "Weather can change quickly; check forecasts and trail conditions." },
        { id: "ushaka", name: "uShaka Marine World (Durban)", province: "KwaZulu‑Natal", x: 3600, y: world.current.groundY - 60, color: "#00838f", fact: "Marine theme park with aquariums, rides, and educational exhibits.", url: "https://ushakamarine.com/", bestTime: "Sep–Apr (warm seas).", pricing: "Ticketed; separate prices for aquarium/wetpark; combo deals vary.", hours: "Typically 09:00–17:00; seasonal/attraction-dependent.", duration: "2–5 hours.", notes: "Bring swimwear for Wet 'n Wild; lockers available." },
        { id: "va-waterfront", name: "V&A Waterfront", province: "Western Cape", x: 4200, y: world.current.groundY - 60, color: "#6a1b9a", fact: "Historic harbor redeveloped into shops, restaurants, and cultural attractions.", url: "https://www.waterfront.co.za/", bestTime: "Year‑round; evenings for dining and sunset views.", pricing: "Free entry; paid attractions/parking.", hours: "Most shops 09:00–21:00; varies by tenant.", duration: "2–4 hours.", notes: "Book popular restaurants in peak season; paid secure parking." },
        { id: "addo", name: "Addo Elephant Park", province: "Eastern Cape", x: 4880, y: world.current.groundY - 60, color: "#bf360c", fact: "Sanctuary near Gqeberha known for large elephant herds.", url: "https://www.sanparks.org/parks/addo", bestTime: "Dry season May–Oct; year‑round wildlife viewing.", pricing: "Daily conservation fees; SANParks rates.", hours: "Gate times vary by camp/season.", duration: "Full‑day self‑drive or 1–3 days.", notes: "Malaria‑free; good tar/gravel roads for sedans." },
        { id: "blyde", name: "Blyde River Canyon", province: "Mpumalanga", x: 5520, y: world.current.groundY - 60, color: "#2e4057", fact: "One of the largest green canyons with views like God’s Window.", url: "https://www.sanparks.org/parks/", bestTime: "May–Sep for clear views; summer is greener with afternoon storms.", pricing: "Entry fees at certain viewpoints.", hours: "Daylight; check site‑specific gates.", duration: "Half‑day along the Panorama Route.", notes: "Combine with Three Rondavels and Bourke’s Luck Potholes." }
      ]);

      const particles = useRef([]);

      function beep(freq = 880, duration = 0.08) {
        try {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          const ctx = (audioCtxRef.current ||= new Ctx());
          const o = ctx.createOscillator(); const g = ctx.createGain(); o.connect(g); g.connect(ctx.destination);
          o.type = "square"; o.frequency.value = freq; g.gain.value = 0.02; o.start(); setTimeout(() => o.stop(), duration * 1000);
        } catch {}
      }

      useEffect(() => {
        const down = (e) => {
          if (e.repeat) return;
          if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") keys.current.left = true;
          if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") keys.current.right = true;
          if (e.key === " ") keys.current.jump = true;
          if (e.key.toLowerCase() === "e") {
            const near = getNearbyAttraction();
            if (near) {
              setActiveAttraction(near);
              if (!visited.has(near.id)) {
                const next = new Set(visited); next.add(near.id); setVisited(next);
                spawnConfetti(near.x, near.y); beep(1200, 0.1);
              }
            }
          }
          if (e.key.toLowerCase() === "p") setPaused((p) => !p);
          if (e.key.toLowerCase() === "h") setShowHelp((s) => !s);
        };
        const up = (e) => {
          if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") keys.current.left = false;
          if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") keys.current.right = false;
          if (e.key === " ") keys.current.jump = false;
        };
        window.addEventListener("keydown", down); window.addEventListener("keyup", up);
        return () => { window.removeEventListener("keydown", down); window.removeEventListener("keyup", up); };
      }, [visited]);

      function getNearbyAttraction() {
        const p = player.current; const proximity = 64;
        return attractions.current.find((a) => Math.abs(a.x - p.x) < proximity);
      }

      function spawnConfetti(x, y) {
        for (let i = 0; i < 40; i++) {
          particles.current.push({ x, y, vx: (Math.random() - 0.5) * 300, vy: -Math.random() * 400 - 200, life: 1.2, color: `hsl(${Math.floor(Math.random() * 360)},70%,60%)` });
        }
      }

      useEffect(() => {
        const canvas = canvasRef.current; const ctx = canvas.getContext("2d");
        let last = performance.now();
        const step = (t) => {
          const dt = Math.min(1 / 30, (t - last) / 1000); last = t;
          if (!paused && !activeAttraction) update(dt);
          render(ctx);
          reqRef.current = requestAnimationFrame(step);
        };
        reqRef.current = requestAnimationFrame(step);
        return () => cancelAnimationFrame(reqRef.current);
      }, [paused, activeAttraction]);

      function update(dt) {
        const p = player.current; const w = world.current;
        let targetVx = 0; if (keys.current.left) targetVx -= p.speed; if (keys.current.right) targetVx += p.speed;
        p.vx = lerp(p.vx, targetVx, 0.2); p.facing = p.vx === 0 ? p.facing : Math.sign(p.vx);
        p.vy += w.gravity * dt;
        if (keys.current.jump && p.onGround) { p.vy = -p.jumpImpulse; p.onGround = false; beep(660, 0.06); }
        p.x += p.vx * dt; p.y += p.vy * dt; p.x = clamp(p.x, 0, w.width - p.w);
        if (p.y + p.h >= w.groundY) { p.y = w.groundY - p.h; p.vy = 0; p.onGround = true; } else { p.onGround = false; }
        const viewportW = Math.min(960, Math.max(320, window.innerWidth - 32));
        camera.current.x = clamp(p.x - viewportW / 2 + p.w / 2, 0, w.width - viewportW);
        particles.current = particles.current.map((pt) => ({ ...pt, vy: pt.vy + w.gravity * 0.6 * dt, x: pt.x + pt.vx * dt, y: pt.y + pt.vy * dt, life: pt.life - dt })).filter((pt) => pt.life > 0);
      }

      function render(ctx) {
        const w = world.current; const camX = camera.current.x;
        const margin = 16;
        const maxW = 960;
        const cssW = Math.min(maxW, Math.max(320, window.innerWidth - margin * 2));
        const cssH = Math.min(600, Math.max(380, Math.round(cssW * 0.625)));
        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        if (ctx.canvas.width !== cssW * dpr || ctx.canvas.height !== cssH * dpr) {
          ctx.canvas.width = cssW * dpr; ctx.canvas.height = cssH * dpr;
          ctx.canvas.style.width = cssW + "px"; ctx.canvas.style.height = cssH + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        const grd = ctx.createLinearGradient(0, 0, 0, cssH); grd.addColorStop(0, "#cfe8ff"); grd.addColorStop(1, "#e8f5e9"); ctx.fillStyle = grd; ctx.fillRect(0, 0, cssW, cssH);
        drawHills(ctx, camX * 0.3, 120, "#b3d1ff"); drawHills(ctx, camX * 0.6, 220, "#c8e6c9");
        ctx.fillStyle = "#7cb342"; ctx.fillRect(-camX, w.groundY, w.width, cssH - w.groundY);
        attractions.current.forEach((a) => {
          const sx = a.x - camX; ctx.fillStyle = a.color;
          ctx.fillRect(sx - 10, a.y - 40, 20, 40); ctx.fillRect(sx - 40, a.y - 60, 80, 20);
          ctx.fillStyle = "#000"; ctx.globalAlpha = 0.8; roundRect(ctx, sx - 90, a.y - 90, 180, 24, 6);
          ctx.fillStyle = "#fff"; ctx.font = "12px sans-serif"; ctx.textAlign = "center"; ctx.fillText(a.name, sx, a.y - 72); ctx.globalAlpha = 1;
          if (visited.has(a.id)) { ctx.strokeStyle = "#ffd600"; ctx.lineWidth = 2; ctx.strokeRect(sx - 42, a.y - 62, 84, 24); }
        });
        const p = player.current; const px = p.x - camX;
        ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.beginPath(); ctx.ellipse(px + p.w / 2, w.groundY + 6, 18, 6, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#1e88e5"; roundRect(ctx, px, p.y, p.w, p.h, 8, true);
        ctx.fillStyle = "#ff7043"; ctx.fillRect(px + 6, p.y - 6, 24, 8); ctx.fillRect(px + (p.facing > 0 ? 18 : -6), p.y + 2, 12, 4);
        ctx.fillStyle = "#5d4037"; roundRect(ctx, px - 6, p.y + 10, 10, 30, 4, true);
        const near = getNearbyAttraction();
        if (near && Math.abs(near.x - p.x) < 56) {
          const sx = near.x - camX; ctx.fillStyle = "rgba(0,0,0,0.6)"; roundRect(ctx, sx - 70, near.y - 130, 140, 28, 6, true);
          ctx.fillStyle = "#fff"; ctx.font = "14px sans-serif"; ctx.textAlign = "center"; ctx.fillText("Press E to learn", sx, near.y - 111);
        }
        particles.current.forEach((pt) => { ctx.fillStyle = pt.color; ctx.fillRect(pt.x - camX, pt.y, 3, 3); });
        drawHUD(ctx, cssW, cssH);
      }

      function drawHUD(ctx, w, h) {
        ctx.fillStyle = "rgba(0,0,0,0.35)"; roundRect(ctx, 12, 10, w - 24, 40, 10, true);
        ctx.fillStyle = "#fff"; ctx.font = "14px system-ui, -apple-system, Segoe UI, Roboto, sans-serif"; ctx.textAlign = "left";
        ctx.fillText(`Visited: ${visited.size} / ${attractions.current.length}`, 28, 36);
        ctx.textAlign = "right"; ctx.fillText("A/D or ◀▶ move • Space jump • E interact • P pause • H help", w - 24, 36);
        if (showHelp) {
          ctx.fillStyle = "rgba(0,0,0,0.6)"; roundRect(ctx, w / 2 - 220, h / 2 - 120, 440, 180, 12, true);
          ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = "18px sans-serif"; ctx.fillText("Welcome to Tourist Quest 2D!", w / 2, h / 2 - 70);
          ctx.font = "14px sans-serif"; ctx.fillText("Explore South African attractions. Get close and press E to learn.", w / 2, h / 2 - 40);
          ctx.fillText("Press H to hide this help. Visit all attractions to win.", w / 2, h / 2 - 18);
          ctx.fillText("Tip: You can jump while moving for longer jumps.", w / 2, h / 2 + 4);
        }
        if (visited.size === attractions.current.length) {
          ctx.fillStyle = "rgba(0,0,0,0.6)"; roundRect(ctx, w / 2 - 200, 70, 400, 44, 10, true);
          ctx.fillStyle = "#ffd600"; ctx.textAlign = "center"; ctx.font = "bold 18px sans-serif"; ctx.fillText("🎉 You visited all attractions! Press H for help or explore more.", w / 2, 98);
        }
      }
      function roundRect(ctx, x, y, w, h, r = 6, fill = true) {
        ctx.beginPath(); ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        if (fill) ctx.fill(); else ctx.stroke();
      }
      function drawHills(ctx, offset, baseY, color) {
        for (let i = -1; i < 8; i++) {
          const x = i * 300 - (offset % 300);
          ctx.fillStyle = color;
          ctx.beginPath(); ctx.moveTo(x, baseY + 200);
          ctx.quadraticCurveTo(x + 80, baseY - 40, x + 150, baseY + 200);
          ctx.quadraticCurveTo(x + 230, baseY - 20, x + 300, baseY + 200);
          ctx.lineTo(x + 300, 600); ctx.lineTo(x, 600); ctx.closePath(); ctx.fill();
        }
      }
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const lerp = (a, b, t) => a + (b - a) * t;

      const Modal = ({ attraction, onClose }) => {
        if (!attraction) return null;
        const InfoRow = ({ label, value }) =>
          value ? (
            <div className="flex items-start gap-2 text-sm">
              <span className="w-28 shrink-0 text-gray-500">{label}</span>
              <span className="text-gray-800">{value}</span>
            </div>
          ) : null;
        return (
          <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-20" onClick={onClose}>
            <div className="bg-white max-w-2xl w-full rounded-2xl shadow-xl p-6 relative" onClick={(e) => e.stopPropagation()}>
              <button onClick={onClose} className="absolute right-3 top-3 rounded-full px-3 py-1 text-sm bg-gray-100 hover:bg-gray-200" aria-label="Close">✕</button>
              <div className="flex items-center gap-3 mb-3">
                <div className="w-8 h-8 rounded-full" style={{ background: attraction.color }} />
                <h2 className="text-xl font-semibold">{attraction.name}</h2>
              </div>
              {attraction.fact && (<p className="text-gray-700 leading-relaxed mb-4">{attraction.fact}</p>)}
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                <InfoRow label="Province" value={attraction.province} />
                <InfoRow label="Best time" value={attraction.bestTime} />
                <InfoRow label="Duration" value={attraction.duration} />
                <InfoRow label="Hours" value={attraction.hours} />
                <InfoRow label="Pricing" value={attraction.pricing} />
                {attraction.notes && (
                  <div className="sm:col-span-2 text-sm text-gray-700">
                    <span className="text-gray-500">Notes: </span>{attraction.notes}
                  </div>
                )}
              </div>
              <div className="mt-1 flex flex-wrap items-center justify-between gap-2">
                <div className="text-xs text-gray-500">Information may change—check the official site before you go.</div>
                <div className="flex gap-2">
                  {attraction.url && (
                    <a className="inline-flex items-center gap-2" style="padding:8px 12px;border-radius:12px;background:#2563eb;color:#fff;text-decoration:none" href={attraction.url} target="_blank" rel="noreferrer">Official site ↗</a>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="w-full h-full flex flex-col items-center justify-center p-4 select-none">
          <div className="mb-2 w-full max-w-[960px] flex items-center justify-between">
            <h1 className="text-2xl font-bold">Tourist Quest 2D</h1>
            <div className="flex items-center gap-2 text-sm">
              <button onClick={() => setPaused((p) => !p)} className="btn btn-ghost">{paused ? "Resume" : "Pause"}</button>
              <button onClick={() => setShowHelp((s) => !s)} className="btn btn-ghost">{showHelp ? "Hide Help" : "Show Help"}</button>
              <div className="px-2 py-1" style="border-radius:10px;background:#e5e7eb;">Visited: {visited.size}/{attractions.current.length}</div>
            </div>
          </div>
          <canvas ref={canvasRef} style="border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.1);border:1px solid #e5e7eb;background:#fff;max-width:960px;width:100%;" />
          <div className="w-full max-w-[960px] mt-3 text-sm" style="color:#374151">
            <p>Tip: This is data‑driven. Edit the <code>attractions</code> array to add <strong>province</strong>, <strong>bestTime</strong>, <strong>pricing</strong>, <strong>hours</strong>, <strong>duration</strong>, and <strong>notes</strong>. The modal renders fields only if present.</p>
          </div>
          <Modal attraction={activeAttraction} onClose={() => setActiveAttraction(null)} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<TouristQuest2D />);
  </script>
</body>
</html>
