<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>Canna vs Zombies</title>
  <meta name="theme-color" content="#1b5e20" />
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    html, body { margin: 0; height: 100%; background: #111; color: #e8f5e9; font-family: monospace; }
    .wrap { display: flex; height: 100%; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; border: 4px solid #2e7d32; background: #223; width: min(95vw, 420px); height: auto; touch-action: none; }
    .hud { width: min(95vw, 420px); display:flex; justify-content:space-between; font-size:14px; }
    .tip { width: min(95vw, 420px); font-size: 12px; color: #a5d6a7; }
    button { background:#2e7d32;color:#fff;border:none;padding:8px 10px;border-radius:8px;font-family:inherit; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin:0">Canna vs Zombies</h2>
    <div class="hud"><span id="score">Score: 0</span><span id="hp">Lives: 3</span></div>
    <canvas id="game" width="192" height="320" aria-label="2D zombie game"></canvas>
    <div class="tip">Move: ← → or drag. Throw cannabis: tap/right side or Space. Share by hosting on GitHub Pages/Netlify.</div>
    <button id="restart" hidden>Restart</button>
  </div>
<script>
const c = document.getElementById('game');
const x = c.getContext('2d');
const scoreEl = document.getElementById('score');
const hpEl = document.getElementById('hp');
const restartBtn = document.getElementById('restart');
const W = c.width, H = c.height;
let player, buds, zombies, score, lives, spawnTick, fireCd, over;

function reset(){
  player = {x: W/2-8, y: H-24, w: 16, h: 10, speed: 120};
  buds = []; zombies = []; score = 0; lives = 3; spawnTick = 0; fireCd = 0; over = false;
  scoreEl.textContent = `Score: ${score}`; hpEl.textContent = `Lives: ${lives}`;
  restartBtn.hidden = true;
}

function spawnZombie(){
  const lane = Math.floor(Math.random()*10);
  zombies.push({x: lane*18+6, y: -12, w: 12, h: 12, vy: 24+Math.random()*26, hp: 1});
}

const keys = {l:false,r:false};
addEventListener('keydown',e=>{ if(e.key==='ArrowLeft') keys.l=true; if(e.key==='ArrowRight') keys.r=true; if(e.code==='Space') shoot(); });
addEventListener('keyup',e=>{ if(e.key==='ArrowLeft') keys.l=false; if(e.key==='ArrowRight') keys.r=false; });

let touchX = null;
c.addEventListener('touchstart', e=>{ const t=e.touches[0]; const r=c.getBoundingClientRect(); touchX=t.clientX-r.left; if(touchX>r.width*0.65) shoot(); });
c.addEventListener('touchmove', e=>{ const t=e.touches[0]; const r=c.getBoundingClientRect(); touchX=t.clientX-r.left; });
c.addEventListener('touchend', ()=> touchX=null);
c.addEventListener('click', e=>{ const r=c.getBoundingClientRect(); if(e.clientX-r.left>r.width*0.6) shoot(); });

function shoot(){
  if(over || fireCd>0) return;
  buds.push({x: player.x+player.w/2-2, y: player.y-6, w:4, h:6, vy:-190});
  fireCd = .22;
}

function step(dt){
  if(over) return;
  fireCd = Math.max(0, fireCd-dt);
  if(keys.l) player.x -= player.speed*dt;
  if(keys.r) player.x += player.speed*dt;
  if(touchX!==null){
    const target = touchX*(W/c.getBoundingClientRect().width)-player.w/2;
    player.x += Math.sign(target-player.x)*player.speed*dt;
  }
  player.x = Math.max(0, Math.min(W-player.w, player.x));

  spawnTick -= dt;
  if(spawnTick<=0){ spawnZombie(); spawnTick = Math.max(.22, .9 - score*0.012); }

  buds.forEach(b=> b.y += b.vy*dt);
  zombies.forEach(z=> z.y += z.vy*dt);

  for(const b of buds){
    for(const z of zombies){
      if(hit(b,z)){ z.hp--; b.y=-999; if(z.hp<=0){ z.y=999; score++; scoreEl.textContent=`Score: ${score}`; } }
    }
  }

  buds = buds.filter(b=> b.y>-20);
  zombies = zombies.filter(z=>{
    if(z.y>H){ lives--; hpEl.textContent=`Lives: ${lives}`; if(lives<=0){ over=true; restartBtn.hidden=false; } return false; }
    return z.y<400;
  });
}

function hit(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

function draw(){
  x.fillStyle='#1a1f2e'; x.fillRect(0,0,W,H);
  for(let i=0;i<11;i++){ x.fillStyle = i%2? '#263238':'#2f3b42'; x.fillRect(i*18,0,1,H); }

  x.fillStyle='#66bb6a'; x.fillRect(player.x,player.y,player.w,player.h);
  x.fillStyle='#2e7d32'; x.fillRect(player.x+4,player.y-3,8,3);

  x.fillStyle='#8bc34a'; buds.forEach(b=> x.fillRect(b.x,b.y,b.w,b.h));

  zombies.forEach(z=>{
    x.fillStyle='#9e9e9e'; x.fillRect(z.x,z.y,z.w,z.h);
    x.fillStyle='#d32f2f'; x.fillRect(z.x+2,z.y+2,2,2); x.fillRect(z.x+8,z.y+2,2,2);
    x.fillStyle='#4e342e'; x.fillRect(z.x+3,z.y+8,6,2);
  });

  if(over){ x.fillStyle='rgba(0,0,0,.7)'; x.fillRect(12,120,168,84); x.fillStyle='#fff'; x.font='10px monospace'; x.fillText('GAME OVER',62,150); x.fillText('Tap restart below',44,168); }
}

let last=performance.now();
function loop(t){ const dt=Math.min(0.033,(t-last)/1000); last=t; step(dt); draw(); requestAnimationFrame(loop); }
restartBtn.addEventListener('click', reset);
reset(); requestAnimationFrame(loop);
</script>
</body>
</html>
