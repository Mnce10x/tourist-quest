services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tourism
      POSTGRES_USER: tourism
      POSTGRES_PASSWORD: tourism
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
  api:
    build: ./apps/api
    env_file: .env.example
    depends_on: [db, redis, minio]
    ports: ["8000:8000"]
  worker:
    build: ./apps/worker
    env_file: .env.example
    depends_on: [api, redis, minio]
  web:
    build: ./apps/web
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on: [api]
    ports: ["5173:5173"]
